# Render Blueprint — https://render.com/docs/blueprint-spec
#
# One-time setup: on render.com, "New +" -> "Blueprint", connect this repo. Render reads this
# file and creates the service below. You'll be prompted for the "sync: false" env vars (the
# real secrets) since those are deliberately NOT committed to the repo.
services:
  - type: web
    name: bitedash-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 6006
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRY_MINUTES
        value: 15
      - key: JWT_REFRESH_EXPIRY_DAYS
        value: 7
      - key: CORS_ORIGIN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
