name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Dummy values only — no live database or real secrets are needed. Unit tests mock the
      # Prisma client entirely, and env.ts just needs well-formed values to pass validation.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      JWT_ACCESS_SECRET: ci-access-secret-not-for-real-use-00000000
      JWT_REFRESH_SECRET: ci-refresh-secret-not-for-real-use-00000000
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

  frontend:
    name: Frontend (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run lint:eslint

      - run: npm test

      - run: npm run build
